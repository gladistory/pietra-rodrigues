# Publica dist/ no branch gh-pages.
#
# Domínio personalizado na raiz: https://piettra-rodrigues.com.br/  →  BASE_HREF = /
# (O ficheiro public/CNAME aponta o GitHub Pages para esse hostname.)
#
# Se voltar a publicar só em https://usuario.github.io/NOME-DO-REPO/, altere BASE_HREF
# para /NOME-DO-REPO/ e remova ou esvazie public/CNAME se não usar domínio próprio.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Raiz do site no domínio (scripts em /main-*.js, não em /repo/main-*.js)
      BASE_HREF: /
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npx ng build --base-href="${BASE_HREF}"

      - name: SPA fallback (404.html)
        run: node scripts/spa-github-pages-fallback.mjs

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
